          <div
            class="lang"
            data-en="<p>The Archaeological Museum, Old Goa, also referred to as Velha 
                      Goa, is one of the prominent site museums of the Archaeological Survey of India. It was 
                      established in 1964 in the abandoned Convent of St. Francis of Assisi, a historic
                      monument that forms part of the group “Churches and Convents of Goa,” inscribed as a 
                      UNESCO World Heritage Site in 1986.<br>

                      Located about ten kilometres east of Panaji, the state capital of Goa, the museum is 
                      accessible by road via the National Highway leading to Belgaum and Hubli. The nearest 
                      railway station is Karmali, situated three kilometres away, and the nearest airports
                      are Dabolim(24 km) and Mopa(42 km).<br>

                      The museum houses a collection of 726 registered antiquities. These range from the early 
                      to late medieval period (9th-15th century) and the Portuguese colonial period (1510–1961).
                      The museum’s exhibits include Hindu and Christian sculptures, hero- and sati-stones, 
                      portrait paintings of Portuguese viceroys and governors, religious artworks, coins, 
                      currency, revenue and court fee stamps, wooden and bronze sculptures, and coat of arms 
                      from the Portuguese era.</p>

                   <p>The museum underwent major reorganisation in 1982, on the eve of the CHOGM Retreat held 
                    in Goa. A large hall on the left side of the entrance was converted into a gallery with 
                    reinforced concrete flooring. A new staircase was built at the western end to provide 
                    access to the upper level, and the entire first floor was relaid with teakwood flooring.
                    <br>
                    The ground floor has five galleries and several thematic spaces such as the Queen 
                    Ketevan Gallery, Vetal display, and Boat Gallery. It also houses an open courtyard, 
                    offices, reserve collection rooms, and a publication counter. The upper floor has three 
                    galleries and adjoining corridors with portrait paintings of Portuguese viceroys and 
                    governors, religious paintings, and wooden sculptures.</p>

                    <p> A 3.6-metre-high bronze statue of Afonso de Albuquerque welcomes visitors at the 
                    entrance. In the lobby are displays such as a map of early sea routes of explorers, 
                    a layout of centrally protected monuments in Goa, a map of Goa, a floor plan of the museum, 
                    an old drawing of the city of Old Goa (1509), photos of centrally protected monuments, 
                    and a 2.2-metre-high stone statue of Afonso de Albuquerque.<br>

                    Gallery 1 introduces visitors to the museum’s exhibits. It includes a short history of Goa 
                    displayed as an open book on a pedestal. To the right is a diorama on prehistoric Goa. 
                    Another section displays the transplantation of the Mahadev temple at Kurdi, highlighting 
                    salvage archaeology. A conjectural model of the ancient Goan capital Chandor is shown based
                     on archaeological findings and local legend.</p>

                    <p>A chronological display of Hindu sculptures begins with a bust of Shiva and Parvati 
                      from the Chalukyan period (7th century CE) and continues with sculptures from the 
                      Silahara and Kadamba periods. Key objects include a 13th-century Vishnu sculpture 
                      flanked by Lakshmi and Garuda, a standing Surya figure with attendants, Gajalakshmi, 
                      Mahishasuramardini, and a headless seated Uma-Mahesvara. Other objects include 
                      architectural fragments, sati-stones, hero-stones, a Kannada inscription of Vijayanagara 
                      king Devaraya, and wooden sculptures of Christian saints.<br>

                      The hero-stones are particularly important for their depictions of naval battles, 
                      which speak to the Kadambas’ maritime strength. One hero-stone depicts a royal figure 
                      in court with a naval battle scene below.<br> 

                      A significant highlight is a three-metre bronze statue of Luís de Camões, the national 
                      poet of Portugal, holding the scrolls of Os Lusíadas, a 16th-century epic poem that 
                      narrates Vasco da Gama’s voyage from Portugal to India and back. The statue was installed 
                      in 1960, damaged in 1982, and later restored.<br>

                      Gallery 2 features models of temple towers, pillars, and sculptures of Shiva and Nandi. 
                      Gallery 3 displays seated figures of Ganesha and Uma-Mahesvara, a model of a 16th-century
                       Portuguese ship, and iron anchors. Gallery 4 focuses on hero- and sati-stones with 
                       panels commemorating acts of bravery and sacrifice.<br> 

                      A new gallery dedicated to Queen Ketevan was inaugurated on 15 May 2023. The event was 
                      attended by Smt. Meenakashi Lekhi, Hon’ble Union Minister of State for Culture and 
                      External Affairs; Mr. Alexander Khvtisiashvili, Deputy Foreign Minister of Georgia; 
                      Archpriest Archil Khachidze of the Georgian Orthodox Church; Ambassadors from various 
                      countries; local guests; and media representatives.</p>

                    <p>Gallery 5 houses objects related to the Adil Shahis of Bijapur, including inscriptions 
                    in Marathi, Arabic, and Persian that mention temple grants, mosque construction, and 
                    fortifications. A massive stone panel features saints Peter and Paul with a Portuguese 
                    inscription dated 1644. A niche in the wall contains a stone pillar brought from St. Thomas
                     Mount, Madras, in 1630, said to contain a piece of the lance that martyred St. Thomas the 
                     Apostle. The pillar also features painted images of St. Thomas and St. Francis of Assisi. 
                     At the centre of the courtyard on the ground floor, is a life-size statue of St. Catherine 
                     beneath a traditional Goan-style canopy. The courtyard includes a lawn, paved pathways, 
                     and decorative grills.</p>

                    <p>A list of all Portuguese governors and viceroys from 1505 to 1961 is displayed on the 
                        western wall of the staircase leading to the upper floor.<br>

                        Gallery 6 displays portraits from the 16th and 17th centuries, Gallery 7 from the 17th 
                        and 18th centuries, and Gallery 8 from the 18th to 20th centuries. At the entrance to 
                        Gallery 7 is information about the Old Goa Revelations (OGR) project – a collaborative 
                        initiative between the Archaeological Survey of India, the University of Évora’s 
                        Hercules Laboratory, and the University of Lisbon’s Faculty of Fine Arts.</p>

                    <p>The tradition of portrait painting began under Viceroy Dom João de Castro (1545–1548), 
                        who had portraits of himself and his 12 predecessors made. The tradition continued 
                        until the end of Portuguese rule in 1961. The paintings, made by local artists in oil 
                        on wood or canvas, were originally displayed in government residences. They were 
                        transferred to the museum in 1962 from the Secretariat in Panaji. Each portrait is 
                        labelled with the name and term of office and mounted behind protective wooden 
                        railings. The collection reflects changing styles of dress, coats of arms, and facial 
                        features.</p>

                        <p>
                            <h2> Important Information </h2>
                        The museum includes a publication counter and video presentations on World Heritage 
                            Sites and Monuments. It is open to visitors from 9:00 AM to 5:00 PM every day 
                            except Friday. Entry is ₹10 per person; children below fifteen years of age are 
                            admitted free of charge.</p>"
            data-hi="<p>पुरातत्व संग्रहालय, पुराना गोवा, जिसे वेल्हा गोवा भी कहा जाता है, भारतीय पुरातत्व सर्वेक्षण के प्रमुख 
                            स्थल संग्रहालयों में से एक है। इसे 1964 में सेंट फ्रांसिस ऑफ असीसी के परित्यक्त कॉन्वेंट में स्थापित किया गया 
                            था, जो एक ऐतिहासिक स्मारक है जो ” चर्चेज एण्ड कान्वेन्ट ऑफ गोवा” के नाम से सन 1986 मे विश्व धरोहर 
                            सूची मे नामांकित स्थल का हिस्सा है।<br>
                            
                            गोवा की राजधानी पणजी से लगभग दस किलोमीटर पूर्व में स्थित यह  संग्रहालय बेलगाम और हुबली की ओर 
                            जाने वाले राष्ट्रीय राजमार्ग के माध्यम से सड़क मार्ग से जुड़ा हुआ है। निकटतम रेलवे स्टेशन करमाली है, जो तीन 
                            किलोमीटर दूर है, और निकटतम हवाई अड्डे डाबोलिम (24 किमी) और मोपा (42 किमी) हैं।<br>

                            संग्रहालय में 726 पंजीकृत प्राचीन वस्तुओं का संग्रह है। ये प्रारंभिक से उत्तर मध्ययुगीन काल (9वीं-15वीं 
                            शताब्दी) और पुर्तगाली औपनिवेशिक काल (1510-1961) तक की हैं। संग्रहालय के प्रदर्शनों में हिंदू और 
                            ईसाई मूर्तियां, वीर ऐव सती-पत्थर, पुर्तगाली वाइसराय और गवर्नरों के चित्र, धार्मिक कलाकृतियां, सिक्के, 
                            मुद्रा, राजस्व और कोर्ट फीस स्टाम्प , लकड़ी और कांस्य मूर्तियां, और पुर्तगाली युग के “कोट ऑफ़ आर्म्स” 
                            शामिल हैं।</p>

                            <p>इस संग्रहालय को सन्न 1982 में राष्ट्रद्धयक्षों को कॉमनवेल्थ सम्मेलन हेतु पुनर्गठित  किया गया था । प्रवेश 
                                द्वार के बाईं ओर एक बड़ा हॉल एक गैलरी में परिवर्तित किया गया था। ऊपरी स्तर तक पहुंच प्रदान 
                                करने के लिए पश्चिमी छोर पर एक नई सीढ़ी बनाई गई, और पूरी पहली मंजिल को सागौन की फर्श से 
                                बनाया गया।<br>

                                भूतल पर पांच गैलरी और कई विषयगत स्थान हैं जैसे कि रानी केतेवान गैलरी, वेताल प्रदर्शन, और नाव 
                                गैलरी। इस तल पर खुला आंगन, कार्यालय, आरक्षित संग्रह कक्ष, और एक प्रकाशन काउंटर भी है। 
                                ऊपरी मंजिल पर तीन गैलरी और आसन्न गलियारे हैं जिनमें पुर्तगाली वाइसराय और गवर्नरों के चित्र, 
                                धार्मिक चित्र, और लकड़ी की मूर्तियां हैं।</p>

                            <p>प्रवेश द्वार पर आगंतुकों का स्वागत 3.6 मीटर ऊंची अफोंसो डी अल्बुकर्क की कांस्य प्रतिमा से होता है। 
                                लॉबी में प्रारंभिक समुद्री मार्गों का नक्शा, गोवा में केंद्रीय रूप से संरक्षित स्मारकों का मॉडल, गोवा का 
                                नक्शा, संग्रहालय की योजना, पुराने गोवा शहर का एक पुराना चित्र (1509), केंद्रीय रूप से संरक्षित स्मारकों 
                                की तस्वीरें, और अफोंसो डी अल्बुकर्क की 2.2 मीटर ऊंची पत्थर की प्रतिमा जैसे प्रदर्शन हैं।<br>

                                गैलरी 1 आगंतुकों को संग्रहालय के प्रदर्शों से परिचित कराती है। इसमें गोवा का संक्षिप्त इतिहास पेडस्टल
                                 पर एक खुले पुस्तक के रूप में प्रदर्शित है। दाईं ओर प्रागैतिहासिक गोवा पर एक डायोरामा है। एक 
                                 अन्य खंड कुर्डी में महादेव मंदिर के प्रत्यारोपण को प्रदर्शित करता है, जो पुरातत्व के बचाओ कार्य  
                                 को उजागर करता है। प्राचीन गोवा की राजधानी चांदोर का एक अनुमानित मॉडल पुरातात्विक खोजों 
                                 और स्थानीय किंवदंती के आधार पर दिखाया गया है।</p>

                            <p>हिंदू मूर्तियों का कालानुक्रमिक प्रदर्शन चालुक्य काल (7वीं शताब्दी ईस्वी) से शिव और पार्वती की  
                                अर्ध-प्रतिमा से शुरू होता है और सिलाहार और कदंब काल की मूर्तियों को दर्शाता है। प्रमुख वस्तुओं 
                                में 13वीं शताब्दी की विष्णु की मूर्ति शामिल है, जिसके दोनों ओर लक्ष्मी और गरुड़ हैं, एक खड़े सूर्य 
                                की आकृति जिसमें परिचारक हैं, गजलक्ष्मी, महिषासुरमर्दिनी, और एक शीषरहित बैठी उमा-महेश्वर की 
                                मूर्ति है। अन्य वस्तुओं में वास्तुकला के खंड, सती-शिला, वीर-शिला , विजयनगर के राजा देवराय का 
                                कन्नड़ अभिलेख, और ईसाई संतों की लकड़ी की मूर्तियां शामिल हैं।<br>

                                वीर शिला विशेष रूप से समुद्री लड़ाइयों के चित्रण के लिए महत्वपूर्ण हैं, जो कदंबों की समुद्री शक्ति 
                                को दर्शाता हैं। एक वीर शिला  पर एक शाही आकृति को दरबार में दिखाया गया है, जिसके नीचे एक 
                                समुद्री युद्ध का दृश्य है।<br>

                                एक महत्वपूर्ण आकर्षण पुर्तगाल के राष्ट्रीय कवि लुइस डी कामोएस की तीन मीटर की कांस्य प्रतिमा है, 
                                जो “ओएस लुसियाड्स” के स्क्रॉल पकड़े हुए है, जो 16वीं शताब्दी का महाकाव्य  है जिसमे वास्को डी 
                                गामा की पुर्तगाल से भारत और वापस की यात्रा का वर्णन किया गया है। यह प्रतिमा सन् 1960 में 
                                स्थापित की गई थी और सन् 1982 में क्षतिग्रस्त हो गई थी, और बाद में इसे पुनः मरमत किया गया।<br>

                                गैलरी 2 में मंदिर के शिखरों , स्तंभों, एवम शिव और नंदी की मूर्तियों को   प्रदर्शित किया गया  हैं। 
                                गैलरी 3 में  गणेश और उमा-महेश्वर की आकृतियां, 16वीं शताब्दी के पुर्तगाली जहाज का मॉडल, और 
                                लोहे के लंगर प्रदर्शित किए गए हैं। गैलरी 4 वीर और सती शिलओं पर केंद्रित है, जिसमें वीरता और 
                                बलिदान के कृत्यों को स्मरण करने वाले पैनल हैं।<br>

                                रानी केतेवान को समर्पित एक नई गैलरी का उद्घाटन 15 मई 2023 को किया गया था। इस अवसर 
                                पर, माननीय केंद्रीय संस्कृति और विदेश राज्य मंत्री श्रीमती मीनाक्षी लेखी; जॉर्जिया के उप विदेश मंत्री 
                                श्री अलेक्जेंडर ख्विटिसियाशविली; जॉर्जियाई ऑर्थोडॉक्स चर्च के आर्कप्रीस्ट आर्चिल खचिदज़े; विभिन्न देशों 
                                के राजदूत; स्थानीय मेहमान और प्रसामाध्यम के प्रतिनिधि उपस्थित थे।</p>

                                <p>गैलरी 5 में बीजापुर के आदिल शाही से संबंधित वस्तुएं हैं, जिनमें मराठी, अरबी और फारसी के 
                                    अभिलेख शामिल हैं जो मंदिर अनुदान, मस्जिद निर्माण और किलेबंदी का उल्लेख करते हैं। एक 
                                    विशाल पत्थर खंड पर संत पीटर और पॉल को 1644 की पुर्तगाली अभिलेख के साथ दिखाया गया है। 
                                    दीवार में एक आले में सन् 1630 में सेंट थॉमस माउंट, मद्रास से लाया गया एक पत्थर का स्तंभ है, 
                                    जिसमें  एक भले का अंकन है  जिसके बारे मे कहा जाता है की इससे सेंट थॉमस द एपोस्टल की 
                                    शहादत हुई थी। स्तंभ पर सेंट थॉमस और सेंट फ्रांसिस ऑफ असीसी की आकृतिया भी हैं। भूतल पर

                                                    <p>
                                                        व्हायसरॉय डॉम जुवांव कास्त्रो (1545–1548) हांच्या काळा पासून रंगीत चित्रांची परंपरा सुरू जाली, जांणी आपलें 
                                                        आनी आपल्या पयलींच्या 12 जाणांचीं चित्रां केल्लीं. ही परंपरा पुर्तुगेजांचे 1961 मेरेनचे राजवटी मेरेन चालू उरली. 
                                                        थळाव्या कलाकारांनी लांकडाचेर वा कॅनव्ह तेल वापरून तयार केल्लीं चित्रां सरकारी निवासस्थानांनी प्रदर्शीत करताले. 
                                                        1962 वर्सा तीं पणजेच्या सचिवालयांतल्यान सग्रहालयांत स्थलांतरीत केलीं.  दरेकी चित्राचेर नांव आनी कार्यकाळ बरयल्लो 
                                                        आसा आनी ताका सुरक्षीत लांकडाची फास्की बसयल्या. ह्या संग्रहांत बदलपी भेसाची शैली, चिलखतां, मुखामळाच्यो 
                                                        विशेशतायो प्रतिबिंबीत जातात.</p>

                                                    <p><h2>महत्वाची माहिती</h2>
                                                    ग्रहालयांत एक प्रकाशन कावण्टर आनी संवसारीक दायज थळां आनी स्मारकांचेर व्हिडिओ हांचो आसपाव आसा. शुक्रार सोडून 
                                                    हेर दिसा सकाळीं 9.00 ते सांजेच्या 5.00 वरां मेरेन भोंवडेकारां खातीर उक्तें आसता. दरेकी व्यक्तीक प्रवेशा खातीर 10 रुपया; 
                                                    जाल्यार पंदरा वर्सां सकयल्ल्या भुरग्यां खातीर फुकट प्रवेश आसा.</p>"
          ></div>
